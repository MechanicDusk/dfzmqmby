<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="windowBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f111b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#0a0b12"/>

  <!-- Main window -->
  <rect x="20" y="20" width="960" height="560" rx="8" fill="url(#windowBg)" filter="url(#shadow)"/>

  <!-- Window header -->
  <rect x="20" y="20" width="960" height="40" rx="8" fill="#14F195" opacity="0.1"/>
  <circle cx="40" cy="40" r="6" fill="#FF5F56"/>
  <circle cx="60" cy="40" r="6" fill="#FFBD2E"/>
  <circle cx="80" cy="40" r="6" fill="#27C93F"/>
  <text x="500" y="45" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="600">Solana Sniper Bot - Dashboard</text>

  <!-- Top stats cards -->
  <g transform="translate(40, 80)">
    <rect width="200" height="80" rx="8" fill="#14F195" opacity="0.1" stroke="#14F195" stroke-width="1"/>
    <text x="15" y="30" font-family="Arial" font-size="12" fill="#14F195" opacity="0.8">Total Profit</text>
    <text x="15" y="55" font-family="Arial" font-size="24" fill="#14F195" font-weight="bold">+$2,847</text>
  </g>

  <g transform="translate(260, 80)">
    <rect width="200" height="80" rx="8" fill="#9945FF" opacity="0.1" stroke="#9945FF" stroke-width="1"/>
    <text x="15" y="30" font-family="Arial" font-size="12" fill="#9945FF" opacity="0.8">Win Rate</text>
    <text x="15" y="55" font-family="Arial" font-size="24" fill="#9945FF" font-weight="bold">73.4%</text>
  </g>

  <g transform="translate(480, 80)">
    <rect width="200" height="80" rx="8" fill="#14F195" opacity="0.1" stroke="#14F195" stroke-width="1"/>
    <text x="15" y="30" font-family="Arial" font-size="12" fill="#14F195" opacity="0.8">Total Trades</text>
    <text x="15" y="55" font-family="Arial" font-size="24" fill="#14F195" font-weight="bold">142</text>
  </g>

  <g transform="translate(700, 80)">
    <rect width="220" height="80" rx="8" fill="#9945FF" opacity="0.1" stroke="#9945FF" stroke-width="1"/>
    <text x="15" y="30" font-family="Arial" font-size="12" fill="#9945FF" opacity="0.8">Status</text>
    <circle cx="15" cy="50" r="6" fill="#27C93F"/>
    <text x="30" y="55" font-family="Arial" font-size="18" fill="#27C93F" font-weight="bold">ACTIVE</text>
  </g>

  <!-- Activity feed -->
  <g transform="translate(40, 190)">
    <text x="0" y="0" font-family="Arial" font-size="16" fill="#fff" font-weight="600">Recent Activity</text>
    <rect y="15" width="440" height="320" rx="8" fill="#1a1d2e" stroke="#14F195" stroke-width="1" opacity="0.5"/>

    <!-- Activity items -->
    <g transform="translate(10, 35)">
      <circle cx="8" cy="8" r="4" fill="#27C93F"/>
      <text x="25" y="12" font-family="Arial" font-size="12" fill="#fff">Token bought: BONK • +284%</text>
      <text x="350" y="12" font-family="Arial" font-size="10" fill="#666">2 min ago</text>
    </g>
    <g transform="translate(10, 70)">
      <circle cx="8" cy="8" r="4" fill="#14F195"/>
      <text x="25" y="12" font-family="Arial" font-size="12" fill="#fff">New pool detected: $MEME</text>
      <text x="350" y="12" font-family="Arial" font-size="10" fill="#666">5 min ago</text>
    </g>
    <g transform="translate(10, 105)">
      <circle cx="8" cy="8" r="4" fill="#27C93F"/>
      <text x="25" y="12" font-family="Arial" font-size="12" fill="#fff">Token sold: PEPE • +156%</text>
      <text x="350" y="12" font-family="Arial" font-size="10" fill="#666">8 min ago</text>
    </g>
    <g transform="translate(10, 140)">
      <circle cx="8" cy="8" r="4" fill="#FF5F56"/>
      <text x="25" y="12" font-family="Arial" font-size="12" fill="#fff">Safety block: Honeypot detected</text>
      <text x="350" y="12" font-family="Arial" font-size="10" fill="#666">12 min ago</text>
    </g>
    <g transform="translate(10, 175)">
      <circle cx="8" cy="8" r="4" fill="#14F195"/>
      <text x="25" y="12" font-family="Arial" font-size="12" fill="#fff">New pool detected: $DOGE2</text>
      <text x="350" y="12" font-family="Arial" font-size="10" fill="#666">15 min ago</text>
    </g>
    <g transform="translate(10, 210)">
      <circle cx="8" cy="8" r="4" fill="#27C93F"/>
      <text x="25" y="12" font-family="Arial" font-size="12" fill="#fff">Token bought: WIF • +92%</text>
      <text x="350" y="12" font-family="Arial" font-size="10" fill="#666">18 min ago</text>
    </g>
  </g>

  <!-- Chart -->
  <g transform="translate(500, 190)">
    <text x="0" y="0" font-family="Arial" font-size="16" fill="#fff" font-weight="600">Performance Chart</text>
    <rect y="15" width="440" height="200" rx="8" fill="#1a1d2e" stroke="#9945FF" stroke-width="1" opacity="0.5"/>

    <!-- Simplified chart line -->
    <path d="M 520 380 Q 580 340, 640 360 T 760 300 T 880 320" fill="none" stroke="#14F195" stroke-width="3" opacity="0.8"/>
    <circle cx="520" cy="380" r="4" fill="#14F195"/>
    <circle cx="640" cy="360" r="4" fill="#14F195"/>
    <circle cx="760" cy="300" r="4" fill="#14F195"/>
    <circle cx="880" cy="320" r="4" fill="#14F195"/>

    <!-- Grid lines -->
    <line x1="510" y1="240" x2="930" y2="240" stroke="#333" stroke-width="1" opacity="0.3"/>
    <line x1="510" y1="290" x2="930" y2="290" stroke="#333" stroke-width="1" opacity="0.3"/>
    <line x1="510" y1="340" x2="930" y2="340" stroke="#333" stroke-width="1" opacity="0.3"/>
    <line x1="510" y1="390" x2="930" y2="390" stroke="#333" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Current positions -->
  <g transform="translate(500, 420)">
    <text x="0" y="0" font-family="Arial" font-size="16" fill="#fff" font-weight="600">Open Positions</text>
    <rect y="15" width="440" height="110" rx="8" fill="#1a1d2e" stroke="#14F195" stroke-width="1" opacity="0.5"/>

    <g transform="translate(15, 40)">
      <rect width="120" height="60" rx="6" fill="#14F195" opacity="0.1"/>
      <text x="10" y="20" font-family="Arial" font-size="12" fill="#14F195">$BONK</text>
      <text x="10" y="40" font-family="Arial" font-size="16" fill="#27C93F" font-weight="bold">+284%</text>
    </g>

    <g transform="translate(150, 40)">
      <rect width="120" height="60" rx="6" fill="#9945FF" opacity="0.1"/>
      <text x="10" y="20" font-family="Arial" font-size="12" fill="#9945FF">$WIF</text>
      <text x="10" y="40" font-family="Arial" font-size="16" fill="#27C93F" font-weight="bold">+92%</text>
    </g>

    <g transform="translate(285, 40)">
      <rect width="120" height="60" rx="6" fill="#14F195" opacity="0.1"/>
      <text x="10" y="20" font-family="Arial" font-size="12" fill="#14F195">$PEPE</text>
      <text x="10" y="40" font-family="Arial" font-size="16" fill="#27C93F" font-weight="bold">+156%</text>
    </g>
  </g>

  <!-- Control buttons -->
  <g transform="translate(40, 535)">
    <rect width="150" height="35" rx="17.5" fill="#27C93F" opacity="0.8"/>
    <text x="75" y="23" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="600">START MONITORING</text>
  </g>

  <g transform="translate(210, 535)">
    <rect width="120" height="35" rx="17.5" fill="#14F195" opacity="0.2" stroke="#14F195" stroke-width="1.5"/>
    <text x="60" y="23" font-family="Arial" font-size="14" fill="#14F195" text-anchor="middle" font-weight="600">SETTINGS</text>
  </g>

  <g transform="translate(350, 535)">
    <rect width="120" height="35" rx="17.5" fill="#9945FF" opacity="0.2" stroke="#9945FF" stroke-width="1.5"/>
    <text x="60" y="23" font-family="Arial" font-size="14" fill="#9945FF" text-anchor="middle" font-weight="600">ANALYTICS</text>
  </g>
</svg>